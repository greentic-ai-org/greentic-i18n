name: i18n Translate Bot

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
  pull_request_target:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    if: github.event_name != 'pull_request_target' || github.event.label.name == 'i18n:translate'
    name: Update translation files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Skip when no i18n baseline
        id: baseline
        shell: bash
        run: |
          if [[ ! -f i18n/en.json ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LANGS=$(find i18n -maxdepth 1 -type f -name '*.json' -printf '%f\n' \
            | sed -E 's/\.json$//' \
            | grep -v '^en$' \
            | sort \
            | paste -sd, -)
          if [[ -z "$LANGS" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "langs=$LANGS" >> "$GITHUB_OUTPUT"

      - name: Translate all languages
        if: steps.baseline.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cargo run -p greentic-i18n-translator -- \
            translate \
            --langs "${{ steps.baseline.outputs.langs }}" \
            --en i18n/en.json \
            --auth-mode api-key

      - name: Detect changes
        if: steps.baseline.outputs.skip != 'true'
        id: changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create translation PR
        if: steps.baseline.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "i18n: update translations"
          title: "i18n: update translations"
          body: |
            Automated translation update via `greentic-i18n-translator`.

            - Trigger: `${{ github.event_name }}`
            - Auth mode: API key
            - Policy: manual overrides preserved by default
          branch: bot/i18n-translate/${{ github.run_id }}-${{ github.run_attempt }}
          delete-branch: false
          labels: i18n, automated

      - name: No-op
        if: steps.baseline.outputs.skip == 'true' || steps.changes.outputs.changed == 'false'
        run: echo "No translation diff detected (or i18n baseline missing)."
